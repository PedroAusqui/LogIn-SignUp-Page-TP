<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>

    <link rel="stylesheet" href="LogInStyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>

</head>
<body>

  <div class="Main-Container">
    <div class="Left-Side">
  <div class="left-content">
    <img src="Img/Logo.png" alt="Logo" class="logo-icon"> <!-- reemplaza con tu icono -->

    <h2>Hello!</h2>
    <h1>Sales Management</h1>

    <p>The easiest way to<br>
    stay on top of your sales.</p>
  </div>
</div>

    <div class="Right-Side">
      <div class="login-container">
        <h1 class="title">Welcome</h1>
        <p class="subtitle">Login in to your account to continue</p>

        <form class="login-form">
          
          <div class="input-group">
            <input type="email" placeholder="Example@gmail.com" required>
          </div>

          <div class="input-group">
            <input type="password" placeholder="Password" id="password" required>
            <input type="checkbox" id="show-pass" class="show-pass" onclick="togglePass()">
            <label for="show-pass" class="toggle-eye"></label>
          </div>

          <div class="options">
            <a href="#">Forgot your password? <span>Click Here</span></a>
          </div>

          <button type="submit" class="btn-login">Login Now</button>

          <p class="signup">
            Don’t have an account? <a href="#">Sign up</a>
          </p>

        </form>
      </div>
    </div>
  </div>

</body>
</html>
